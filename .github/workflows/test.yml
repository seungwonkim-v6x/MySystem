name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  bats:
    runs-on: ubuntu-latest
    env:
      # Scripts default to ~/.claude; point them at the checkout instead.
      CLAUDE_HOME: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install bats + jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq bats jq
      - name: Run test suite
        run: bats tests/
